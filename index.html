<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Itinerary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --card: #161411;
    --card2: #1c1915;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.18);
    --gold-dim2: rgba(201,169,110,0.08);
    --text: #e8e2d9;
    --text-dim: rgba(232,226,217,0.55);
    --text-muted: rgba(232,226,217,0.35);
    --spine: rgba(201,169,110,0.22);
    --drawer-bg: #181612;
    --grey-opacity: 0.38;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* ── LOGIN ───────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 32px;
    gap: 0;
  }
  #login-screen.hidden { display: none; }

  .login-ornament {
    color: var(--gold);
    font-size: 28px;
    letter-spacing: 12px;
    margin-bottom: 32px;
    opacity: 0.7;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--text);
    text-align: center;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .login-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 48px;
  }
  .login-field {
    width: 100%;
    max-width: 280px;
    position: relative;
    margin-bottom: 16px;
  }
  .login-field input {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 6px;
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--text);
    text-align: center;
    letter-spacing: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-field input::placeholder { letter-spacing: 1px; color: var(--text-muted); }
  .login-field input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%;
    max-width: 280px;
    background: var(--gold);
    color: #0f0e0c;
    border: none;
    border-radius: 6px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error {
    margin-top: 14px;
    font-size: 12px;
    color: #c07070;
    text-align: center;
    min-height: 18px;
    letter-spacing: 0.5px;
  }

  /* ── HEADER ──────────────────────────────────────── */
  #header {
    position: relative;
    min-height: 200px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  #header-banner {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center top;
    background-color: #1a1712;
  }
  #header-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(15,14,12,0.35) 0%,
      rgba(15,14,12,0.1) 30%,
      rgba(15,14,12,0.72) 75%,
      rgba(15,14,12,0.97) 100%
    );
  }
  #header-content {
    position: relative;
    z-index: 2;
    padding: 20px 20px 0;
  }
  .trip-label {
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .trip-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* ── DAY TABS ────────────────────────────────────── */
  #day-tabs-wrap {
    position: relative;
    z-index: 2;
    padding: 0 16px 16px;
  }
  #day-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  #day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(201,169,110,0.35);
    color: var(--text-dim);
    background: transparent;
    white-space: nowrap;
    user-select: none;
  }
  .day-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0f0e0c;
    font-weight: 600;
  }

  /* ── CLOCK STRIP ─────────────────────────────────── */
  #clock-strip {
    background: var(--card);
    border-bottom: 1px solid rgba(201,169,110,0.1);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clock-day-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--gold);
    opacity: 0.85;
  }
  .clock-time {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ── TIMELINE ────────────────────────────────────── */
  #timeline-wrap {
    position: relative;
    min-height: 60vh;
  }
  #bg-image {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.07;
    pointer-events: none;
    transition: background-image 0.4s;
  }
  #timeline {
    position: relative;
    z-index: 1;
    padding: 24px 20px 100px;
  }

  .timeline-inner {
    position: relative;
    padding-left: 56px;
  }
  .timeline-spine {
    position: absolute;
    left: 18px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--spine) 10%, var(--spine) 90%, transparent);
  }

  /* ── ACTIVITY CARD ───────────────────────────────── */
  .activity-row {
    position: relative;
    margin-bottom: 18px;
    transition: opacity 0.35s, filter 0.35s;
  }
  .activity-row.past {
    opacity: var(--grey-opacity);
    filter: saturate(0.15);
  }
  .activity-dot {
    position: absolute;
    left: -43px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--spine);
    border: 1.5px solid var(--spine);
    transition: background 0.3s, border-color 0.3s;
    z-index: 2;
  }
  .activity-row.upcoming .activity-dot {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(201,169,110,0.15);
  }
  .activity-time {
    position: absolute;
    left: -56px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    width: 38px;
    line-height: 1.2;
    letter-spacing: 0.3px;
  }
  .activity-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .activity-card:active { background: var(--card2); }
  .activity-row.upcoming .activity-card {
    border-color: rgba(201,169,110,0.28);
    background: #1a1812;
  }
  .activity-icon {
    font-size: 20px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--gold-dim2);
    border-radius: 8px;
  }
  .activity-main { flex: 1; min-width: 0; }
  .activity-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .activity-location {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .upnext-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .upnext-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── LOADING / ERROR ─────────────────────────────── */
  #loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 32px;
    gap: 16px;
    color: var(--text-muted);
  }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--gold-dim);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; letter-spacing: 1px; }

  /* ── BOTTOM DRAWER ───────────────────────────────── */
  #drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(2px);
  }
  #drawer-backdrop.open { opacity: 1; pointer-events: all; }

  #drawer {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--drawer-bg);
    border-radius: 16px 16px 0 0;
    z-index: 101;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    border-top: 1px solid rgba(201,169,110,0.15);
  }
  #drawer.open { transform: translateX(-50%) translateY(0); }

  .drawer-handle-wrap {
    padding: 12px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .drawer-handle {
    width: 36px; height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
  }
  .drawer-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 0 22px 40px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .drawer-scroll::-webkit-scrollbar { display: none; }

  .drawer-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .drawer-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 4px;
  }
  .drawer-time {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .drawer-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 16px 0;
  }
  .drawer-section-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .drawer-story {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1.65;
    font-style: italic;
  }
  .drawer-map-link {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--gold-dim2);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-map-link:active { background: var(--gold-dim); }
  .drawer-map-icon { font-size: 18px; flex-shrink: 0; }
  .drawer-map-text { flex: 1; min-width: 0; }
  .drawer-map-label { font-size: 10px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .drawer-map-addr { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drawer-url-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--gold);
    text-decoration: none;
    font-size: 13px;
    border-bottom: 1px solid rgba(201,169,110,0.3);
    padding-bottom: 2px;
  }
  .drawer-notes {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ── EMPTY STATE ─────────────────────────────────── */
  .empty-day {
    padding: 60px 32px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty-day-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-day-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; font-style: italic; }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-ornament">✦ ✦ ✦</div>
    <div class="login-title">Welcome</div>

    <div class="login-field">
      <input type="text" id="code-input" placeholder="Enter your access code" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <button class="login-btn" onclick="attemptLogin()">Continue</button>

  </div>

  <!-- MAIN APP -->
  <div id="main-app" style="display:none;">

    <div id="header">
      <div id="header-banner"></div>
      <div id="header-gradient"></div>
      <div id="header-content">
        <div class="trip-label">Your Itinerary</div>

<script>
/* ── CONFIG ──────────────────────────────────────── */
const SHEET_ID = '1Y0qgm9aov7qaQOcdE3khXit85loGs9FmU2tvsl0ZCXU';
const API_KEY  = 'AIzaSyBpvELhAkbUZQXwjhz65S28tRX4iNHIdhk';

const GROUPS = [
  { tab: 'obrien',     code: '2012',   name: 'April Visit' },
  { tab: 'assynipple', code: 'wyllie', name: 'Wyllie' },
  { tab: 'kelly',      code: 'kelly',  name: 'Stacey & Aaron' },
  { tab: 'group4',     code: 'GROUP4', name: 'Group 4' },
  { tab: 'group5',     code: 'GROUP5', name: 'Group 5' },
];

let currentGroup = null;
let allData = [];          // all rows from sheet
let days = [];             // sorted unique day numbers
let activeDay = 1;
let clockInterval = null;

/* ── UTILS ───────────────────────────────────────── */
function gdriveDirect(url) {
  if (!url) return '';
  url = url.trim();
  // Already a direct URL
  if (url.includes('/uc?') || url.includes('drive.usercontent')) return url;
  // share link pattern
  const m = url.match(/\/d\/([^/]+)\//);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  // open?id= pattern
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
  return url;
}

function parseTime(hourStr) {
  // e.g. "8:00 PM", "10:30 AM"
  if (!hourStr) return null;
  hourStr = hourStr.trim();
  const m = hourStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  const ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h < 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;  // minutes since midnight
}

function nowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function formatClockTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function inferIcon(title) {
  if (!title) return '✦';
  const t = title.toLowerCase();
  const map = [
    [/coffee|café|cafe|espresso|latte|brew/,'☕'],
    [/breakfast|brunch/,'🍳'],
    [/lunch/,'🥗'],
    [/dinner|supper|restaurant|bistro|tavern|eatery/,'🍽️'],
    [/wine|winery|cellar|tasting|vineyard/,'🍷'],
    [/beer|brewery|pub|bar|cocktail|drinks|aperitivo/,'🍸'],
    [/walk|hike|trail|nature|park|garden/,'🌿'],
    [/beach|ocean|sea|swim|snorkel/,'🏖️'],
    [/boat|sail|ferry|cruise|kayak|canoe/,'⛵'],
    [/spa|massage|wellness|yoga/,'🧖'],
    [/museum|gallery|art|exhibit/,'🖼️'],
    [/church|cathedral|chapel|historic|heritage/,'⛪'],
    [/market|shop|shopping|boutique/,'🛍️'],
    [/flight|airport|transfer|depart|arrive/,'✈️'],
    [/hotel|check.in|check.out|accommodation|resort/,'🏨'],
    [/car|drive|rental|pickup/,'🚗'],
    [/music|concert|show|performance/,'🎵'],
    [/photo|sunrise|sunset|viewpoint|lookout/,'📸'],
    [/picnic|outdoor/,'🧺'],
    [/cooking|class|workshop/,'👨‍🍳'],
    [/tour|guide/,'🗺️'],
    [/free|leisure|relax|rest/,'🌅'],
    [/check out|checkout|departure/,'🧳'],
  ];
  for (const [re, icon] of map) {
    if (re.test(t)) return icon;
  }
  return '✦';
}

function buildMapUrl(row) {
  // If MAP column has a full URL use it
  if (row.MAP && row.MAP.match(/^https?:\/\//)) return row.MAP;
  // Build from ADDRESS (prefer LOCATION as display, ADDRESS for geocoding)
  const dest = row.ADDRESS || row.LOCATION;
  if (!dest) return null;
  return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`;
}

/* ── LOGIN ───────────────────────────────────────── */
function attemptLogin(codeOverride) {
  const input = codeOverride || document.getElementById('code-input').value.trim();
  const group = GROUPS.find(g => g.code.toLowerCase() === input.toLowerCase());
  if (!group) {
    document.getElementById('login-error').textContent = 'Code not recognised. Please try again.';
    return;
  }
  localStorage.setItem('itinerary_code', input);
  startApp(group);
}

function checkAutoLogin() {
  // Check URL param first
  const params = new URLSearchParams(window.location.search);
  const urlCode = params.get('code');
  if (urlCode) {
    const group = GROUPS.find(g => g.code.toLowerCase() === urlCode.toLowerCase());
    if (group) { startApp(group); return; }
  }
  // Check localStorage
  const saved = localStorage.getItem('itinerary_code');
  if (saved) {
    const group = GROUPS.find(g => g.code.toLowerCase() === saved.toLowerCase());
    if (group) { startApp(group); return; }
  }
  // Show login
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('code-input').focus();
}

/* ── FETCH SHEET DATA ────────────────────────────── */
async function fetchSheet(tabName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tabName)}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);
  const json = await res.json();
  const rows = json.values || [];
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toUpperCase());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
    return obj;
  }).filter(r => r.DAY);
}

/* ── TODAY'S DAY LOGIC ───────────────────────────── */
function findTodayDay(data) {
  const todayStr = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const match = data.find(r => r.DATE === todayStr);
  if (match) return parseInt(match.DAY, 10);
  // Find min and max days with dates
  const dated = data.filter(r => r.DATE).map(r => ({
    day: parseInt(r.DAY, 10),
    date: r.DATE
  }));
  if (!dated.length) return 1;
  dated.sort((a,b) => a.day - b.day);
  if (todayStr < dated[0].date) return dated[0].day;
  return dated[dated.length - 1].day;
}

/* ── START APP ───────────────────────────────────── */
async function startApp(group) {
  currentGroup = group;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('trip-name').textContent = group.name;

  try {
    allData = await fetchSheet(group.tab);
    // Extract sorted unique day numbers
    const daySet = new Set(allData.map(r => parseInt(r.DAY, 10)));
    days = [...daySet].sort((a,b) => a-b);

    buildDayTabs();
    activeDay = findTodayDay(allData);
    switchDay(activeDay);
    startClock();
  } catch(e) {
    document.getElementById('loading-state').innerHTML = `
      <div style="color:#c07070;text-align:center;padding:40px 24px;">
        <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:8px;">Couldn't load itinerary</div>
        <div style="font-size:12px;opacity:0.6;">${e.message}</div>
      </div>`;
  }
}

/* ── BUILD TABS ──────────────────────────────────── */
function buildDayTabs() {
  const wrap = document.getElementById('day-tabs');
  wrap.innerHTML = '';
  days.forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'day-tab';
    btn.textContent = `Day ${d}`;
    btn.dataset.day = d;
    btn.onclick = () => switchDay(d);
    wrap.appendChild(btn);
  });
}

/* ── SWITCH DAY ──────────────────────────────────── */
function switchDay(dayNum) {
  activeDay = dayNum;

  // Update tab styles
  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.day) === dayNum);
    if (parseInt(t.dataset.day) === dayNum) {
      t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  });

  // Update background image from first row of this day that has BG_IMAGE
  const dayRows = allData.filter(r => parseInt(r.DAY) === dayNum);
  const bgRow = dayRows.find(r => r.BG_IMAGE);
  const bgEl = document.getElementById('bg-image');
  if (bgRow && bgRow.BG_IMAGE) {
    bgEl.style.backgroundImage = `url('${gdriveDirect(bgRow.BG_IMAGE)}')`;
  } else {
    bgEl.style.backgroundImage = '';
  }

  // Update header banner from first row with BANNER_IMAGE
  const bannerRow = dayRows.find(r => r.BANNER_IMAGE);
  const bannerEl = document.getElementById('header-banner');
  if (bannerRow && bannerRow.BANNER_IMAGE) {
    bannerEl.style.backgroundImage = `url('${gdriveDirect(bannerRow.BANNER_IMAGE)}')`;
  } else {
    bannerEl.style.backgroundImage = '';
  }

  // Update clock label
  const dateRow = dayRows.find(r => r.DATE);
  updateClockLabel(dayNum, dateRow ? dateRow.DATE : null);

  renderTimeline(dayNum);
}

/* ── CLOCK ───────────────────────────────────────── */
function startClock() {
  updateClock();
  clockInterval = setInterval(updateClock, 60000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent = formatClockTime(now);
  renderTimeline(activeDay); // refresh states
}

function updateClockLabel(dayNum, dateStr) {
  let label = `Day ${dayNum}`;
  if (dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }
  document.getElementById('clock-day-label').textContent = label;
}

/* ── RENDER TIMELINE ─────────────────────────────── */
function renderTimeline(dayNum) {
  const dayRows = allData
    .filter(r => parseInt(r.DAY) === dayNum)
    .sort((a,b) => {
      const ta = parseTime(a.HOUR) ?? 9999;
      const tb = parseTime(b.HOUR) ?? 9999;
      return ta - tb;
    });

  const loading = document.getElementById('loading-state');
  const content = document.getElementById('timeline-content');
  loading.style.display = 'none';
  content.style.display = 'block';

  if (!dayRows.length) {
    content.innerHTML = `<div class="empty-day">
      <div class="empty-day-icon">✦</div>
      <div class="empty-day-text">Nothing scheduled for this day</div>
    </div>`;
    return;
  }

  // Determine which day relative to today
  const todayStr = new Date().toISOString().slice(0,10);
  const dateRow = dayRows.find(r => r.DATE);
  let dayDate = dateRow ? dateRow.DATE : null;
  let isPastDay = false, isTodayDay = false, isFutureDay = false;
  if (dayDate) {
    if (dayDate < todayStr) isPastDay = true;
    else if (dayDate === todayStr) isTodayDay = true;
    else isFutureDay = true;
  } else {
    isFutureDay = true; // unknown → show normally
  }

  const now = nowMinutes();

  // Find "up next" index for today
  let upNextIdx = -1;
  if (isTodayDay) {
    for (let i = 0; i < dayRows.length; i++) {
      const t = parseTime(dayRows[i].HOUR);
      if (t !== null && t > now) { upNextIdx = i; break; }
    }
    // If all are past, no upnext
  }

  content.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'timeline-inner';
  inner.innerHTML = '<div class="timeline-spine"></div>';

  dayRows.forEach((row, i) => {
    const rowTime = parseTime(row.HOUR);
    let rowClass = 'activity-row';

    if (isPastDay) {
      rowClass += ' past';
    } else if (isTodayDay) {
      if (rowTime !== null && rowTime <= now) rowClass += ' past';
      else if (i === upNextIdx) rowClass += ' upcoming';
    }
    // future day: normal

    const loc = row.LOCATION || row.ADDRESS || '';
    const icon = inferIcon(row.ACTIVITY);

    const rowEl = document.createElement('div');
    rowEl.className = rowClass;
    rowEl.innerHTML = `
      <div class="activity-time">${formatHour(row.HOUR)}</div>
      <div class="activity-dot"></div>
      <div class="activity-card" onclick="openDrawer(${i})">
        <div class="activity-icon">${icon}</div>
        <div class="activity-main">
          <div class="activity-title">${esc(row.ACTIVITY || '—')}</div>
          ${loc ? `<div class="activity-location">📍 ${esc(loc)}</div>` : ''}
        </div>
        ${i === upNextIdx && isTodayDay ? `<div class="upnext-badge"><div class="upnext-dot"></div>Up next</div>` : ''}
      </div>`;
    inner.appendChild(rowEl);
  });

  content.appendChild(inner);

  // Store rows for drawer
  window._currentRows = dayRows;
}

function formatHour(s) {
  if (!s) return '';
  // Shorten: "8:00 AM" → "8 AM", "10:30 PM" → "10:30"
  return s.replace(/:00\s/g, ' ').replace(/\s/g, '<br>');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── DRAWER ──────────────────────────────────────── */
function openDrawer(idx) {
  const row = (window._currentRows || [])[idx];
  if (!row) return;

  const icon = inferIcon(row.ACTIVITY);
  const mapUrl = buildMapUrl(row);
  const loc = row.LOCATION || row.ADDRESS || '';
  const addr = row.ADDRESS || row.LOCATION || '';

  let html = `
    <div class="drawer-icon">${icon}</div>
    <div class="drawer-title">${esc(row.ACTIVITY || '—')}</div>
    <div class="drawer-time">${row.HOUR || ''}${row.DATE ? ' · ' + formatDate(row.DATE) : ''}</div>`;

  if (row.STORY) {
    html += `<div class="drawer-divider"></div>
    <div class="drawer-section-label">The Story</div>
    <div class="drawer-story">${esc(row.STORY)}</div>`;
  }

  if (mapUrl) {
    html += `<div class="drawer-divider"></div>
    <div class="drawer-section-label">Directions</div>
    <a class="drawer-map-link" href="${mapUrl}" target="_blank" rel="noopener">
      <div class="drawer-map-icon">🗺️</div>
      <div class="drawer-map-text">
        <div class="drawer-map-label">Open in Google Maps</div>
        <div class="drawer-map-addr">${esc(addr || loc)}</div>
      </div>
      <div style="color:var(--gold);font-size:14px;">→</div>
    </a>`;
  }

  if (row.FIELD1) {
    html += `<div class="drawer-divider"></div>
    <div class="drawer-section-label">Notes</div>
    <div class="drawer-notes">${esc(row.FIELD1)}</div>`;
  }

  if (row.URL && row.URL.match(/^https?:\/\//)) {
    html += `<div class="drawer-divider"></div>
    <a class="drawer-url-link" href="${row.URL}" target="_blank" rel="noopener">
      <span>🔗</span> More information
    </a>`;
  }

  document.getElementById('drawer-body').innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function formatDate(s) {
  if (!s) return '';
  try {
    return new Date(s + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch { return s; }
}

/* ── SWIPE TO CLOSE DRAWER ───────────────────────── */
(function() {
  const drawer = document.getElementById('drawer');
  let startY = 0, isDragging = false;

  drawer.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  drawer.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      drawer.style.transform = `translateX(-50%) translateY(${dy}px)`;
    }
  }, { passive: true });

  drawer.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dy = e.changedTouches[0].clientY - startY;
    drawer.style.transform = '';
    if (dy > 80) closeDrawer();
    isDragging = false;
  });
})();

/* ── ENTER KEY ON LOGIN ──────────────────────────── */
document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});

checkAutoLogin();
