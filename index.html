<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Visit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --ink: #1a1612;
    --ink-muted: #7a7268;
    --accent: #c8502a;
    --accent-light: #f5ede8;
    --border: #e8e2d9;
    --day-bg: #1a1612;
    --day-text: #f7f4ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--day-bg);
    position: relative;
    overflow: hidden;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('https://photos.fife.usercontent.google.com/pw/AP1GczPdiHSajFgcgkh3PqYlNmaJUI6fYAiVJt8fPREGroHBJQEajTQjlQM');
    background-size: cover;
    background-position: center 30%;
    opacity: 0.4;
    z-index: 0;
  }

  #login-screen > * {
    position: relative;
    z-index: 1;
  }

  .login-eyebrow {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #c9a96e;
    margin-bottom: 3rem;
  }

  .login-eyebrow::before,
  .login-eyebrow::after {
    content: '\2014';
    color: #c9a96e;
  }

  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 13vw, 5.5rem);
    font-weight: 300;
    color: #f5f0e8;
    line-height: 1.05;
    text-align: center;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }

  .login-byline {
    font-family: 'Jost', sans-serif;
    font-size: 0.84rem;
    letter-spacing: 0.12em;
    color: rgba(245,240,232,0.45);
    text-align: center;
    margin-bottom: 4rem;
  }

  .login-box {
    background: var(--surface);
    border-radius: 1rem;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }

  .login-box label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
  }

  .login-box input {
    width: 100%;
    padding: 0.9rem 1rem;
    border: 2px solid var(--border);
    border-radius: 0.5rem;
    font-size: 1.1rem;
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 0.5rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.85; }

  .login-error {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--accent);
    text-align: center;
    min-height: 1.2em;
  }

  /* ── APP ── */
  #app { display: none; }

  .app-header {
    background: var(--day-bg);
    padding: 1.5rem 1.25rem 1.25rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #5a5248;
    margin-bottom: 0.15rem;
  }

  .header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 600;
    color: var(--day-text);
    line-height: 1.1;
  }

  .header-name span {
    color: var(--accent);
    font-style: italic;
  }

  /* ── DAY GROUP ── */
  .day-group { margin-bottom: 0.5rem; }

  .day-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.25rem 1.25rem 0.6rem;
  }

  .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.9rem;
    font-weight: 300;
    color: #b8ad9e;
    line-height: 1;
    user-select: none;
  }

  .day-info { flex: 1; }

  .day-word {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9e958a;
    font-weight: 500;
  }

  .day-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: #3a3530;
  }

  .day-rule {
    height: 1px;
    background: var(--border);
    margin: 0 1.25rem 0.75rem;
  }

  /* ── ACTIVITY CARD ── */
  .cards { padding: 0 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

  .card {
    background: var(--surface);
    border-radius: 0.875rem;
    overflow: hidden;
    border: 1px solid rgba(232,226,217,0.6);
    transition: box-shadow 0.2s;
  }

  .card:active { box-shadow: 0 6px 24px rgba(0,0,0,0.1); }

  .card-inner { padding: 1.1rem 1.25rem 1.25rem; }

  /* TIME — big and bold */
  .card-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.31rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.3rem;
    letter-spacing: 0.02em;
    opacity: 0.85;
  }

  .card-time-label {
    font-size: 0.63rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  /* ACTIVITY — hero text */
  .card-activity {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    font-weight: 300;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  /* LOCATION */
  .card-location {
    display: flex;
    align-items: flex-start;
    gap: 0.35rem;
    font-size: 0.86rem;
    color: var(--ink-muted);
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

  .card-location svg {
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--accent);
    opacity: 0.7;
  }

  /* FIELD1 / notes */
  .card-field1 {
    font-size: 0.89rem;
    color: var(--ink-muted);
    line-height: 1.6;
    font-weight: 300;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    margin-top: 0.6rem;
  }

  /* STORY */
  .card-story {
    font-size: 0.92rem;
    color: var(--ink-muted);
    line-height: 1.7;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
    margin-top: 0.6rem;
    font-style: italic;
  }

  /* URL link */
  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.75rem;
    padding: 0.55rem 1rem;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 2rem;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: background 0.2s;
  }

  .card-link:hover { background: #eedad2; }

  /* accent strip on left of card for "now" */
  .card.is-now { border-left: 4px solid var(--accent); }

  /* ── LOADING / ERROR ── */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    gap: 0.75rem;
    color: var(--ink-muted);
    font-size: 0.945rem;
    padding: 2rem;
    text-align: center;
  }

  .spinner {
    width: 2rem; height: 2rem;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <p class="login-eyebrow">Guest Itinerary</p>
  <h1 class="login-title">Welcome,<br>you're expected.</h1>
  <p class="login-byline">relax and pull some weeds</p>
  <div class="login-box">
    <label for="code-input">Access Code</label>
    <input id="code-input" type="text" placeholder="Enter your code" autocomplete="off" autocapitalize="none" spellcheck="false">
    <button class="login-btn" onclick="handleLogin()">Let's Go →</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <p class="header-eyebrow">Your itinerary</p>
    <h1 class="header-name" id="group-title">Loading…</h1>
  </header>
  <main id="itinerary-body"></main>
</div>

<script>
const SHEET_ID = '1Y0qgm9aov7qaQOcdE3khXit85loGs9FmU2tvsl0ZCXU';
const API_KEY  = 'AIzaSyBpvELhAkbUZQXwjhz65S28tRX4iNHIdhk';

const GROUPS = {
  '2012':    { tab: 'obrien',     name: 'April Visit' },
  'wyllie':  { tab: 'assynipple', name: 'Wyllie' },
  'kelly':   { tab: 'kelly',      name: 'Stacey & Aaron' },
  'GROUP4':  { tab: 'group4',     name: 'Group 4' },
  'GROUP5':  { tab: 'group5',     name: 'Group 5' },
};

// Check URL param on load
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) tryCode(code);
});

document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

function handleLogin() {
  const raw = document.getElementById('code-input').value.trim();
  tryCode(raw);
}

function tryCode(raw) {
  // case-insensitive match
  const match = Object.entries(GROUPS).find(([k]) => k.toLowerCase() === raw.toLowerCase());
  if (!match) {
    document.getElementById('login-error').textContent = 'Code not recognised — try again.';
    return;
  }
  const [, group] = match;
  loadItinerary(group);
}

async function loadItinerary(group) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const titleEl = document.getElementById('group-title');
  // Bold name with italic accent on last word
  const parts = group.name.split(' ');
  if (parts.length > 1) {
    titleEl.innerHTML = parts.slice(0, -1).join(' ') + ' <span>' + parts.at(-1) + '</span>';
  } else {
    titleEl.innerHTML = '<span>' + group.name + '</span>';
  }

  const body = document.getElementById('itinerary-body');
  body.innerHTML = `<div class="state-msg"><div class="spinner"></div><p>Fetching your plans…</p></div>`;

  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(group.tab)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Sheet fetch failed');
    const json = await res.json();
    const [header, ...rows] = json.values || [];

    const col = k => header.findIndex(h => h.trim().toUpperCase() === k.toUpperCase());
    const iDay = col('DAY'), iHour = col('HOUR'), iAct = col('ACTIVITY'),
          iLoc = col('LOCATION'), iF1 = col('FIELD1'), iUrl = col('URL'), iStory = col('STORY');

    // Group by day
    const days = {};
    for (const row of rows) {
      const day = row[iDay] || '?';
      if (!days[day]) days[day] = [];
      days[day].push(row);
    }

    // Render
    body.innerHTML = Object.entries(days).map(([day, items]) => `
      <div class="day-group">
        <div class="day-label">
          <div class="day-num">${String(day).padStart(2,'0')}</div>
          <div class="day-info">
            <div class="day-word">Day</div>
            <div class="day-date">${dayLabel(day, items)}</div>
          </div>
        </div>
        <div class="day-rule"></div>
        <div class="cards">
          ${items.map(row => renderCard(row, iHour, iAct, iLoc, iF1, iUrl, iStory)).join('')}
        </div>
      </div>
    `).join('');

  } catch (e) {
    body.innerHTML = `<div class="state-msg"><p>Couldn't load your itinerary.<br>Please check your connection.</p></div>`;
  }
}

function renderCard(row, iHour, iAct, iLoc, iF1, iUrl, iStory) {
  const hour    = iHour  >= 0 ? (row[iHour]  || '') : '';
  const act     = iAct   >= 0 ? (row[iAct]   || '') : '';
  const loc     = iLoc   >= 0 ? (row[iLoc]   || '') : '';
  const field1  = iF1    >= 0 ? (row[iF1]    || '') : '';
  const url     = iUrl   >= 0 ? (row[iUrl]   || '') : '';
  const story   = iStory >= 0 ? (row[iStory] || '') : '';

  const timeStr = formatHour(hour);

  return `
    <div class="card">
      <div class="card-inner">
        ${timeStr ? `
          <div class="card-time">${timeStr}</div>
          <div class="card-time-label">Time</div>
        ` : ''}
        ${act ? `<div class="card-activity">${act}</div>` : ''}
        ${loc ? `
          <div class="card-location">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${loc}
          </div>
        ` : ''}
        ${field1 ? `<div class="card-field1">${field1}</div>` : ''}
        ${story  ? `<div class="card-story">${story}</div>`  : ''}
        ${url    ? `<a class="card-link" href="${url}" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          More info
        </a>` : ''}
      </div>
    </div>
  `;
}

function formatHour(raw) {
  if (!raw && raw !== 0) return '';
  const n = parseFloat(String(raw).replace(',','.'));
  if (isNaN(n)) return raw;
  const h = Math.floor(n);
  const m = Math.round((n - h) * 60);
  const hh = h % 12 || 12;
  const ampm = h < 12 ? 'am' : 'pm';
  return m === 0 ? `${hh}${ampm}` : `${hh}:${String(m).padStart(2,'0')}${ampm}`;
}

function dayLabel(day, items) {
  // Just show "Day N" label nicely — could enhance with actual dates if sheet provides them
  const ordinals = ['','First','Second','Third','Fourth','Fifth','Sixth','Seventh'];
  const n = parseInt(day);
  return ordinals[n] ? ordinals[n] + ' Day' : `Day ${day}`;
}
</script>
</body>
</html>
